<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Advanced Blood Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root{
  --primary:#C0152A; --primary-dark:#8B0000; --bg:#f8f8f8; --card:#fff; --text:#333;
}
body{
  margin:0; font-family:'Roboto',sans-serif; background:var(--bg); display:flex; justify-content:center; align-items:center; height:100vh;
}
.card{
  background:var(--card); border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.08);
  display:flex; overflow:hidden; max-width:900px; width:100%;
}
.left-panel{
  flex:1; background: linear-gradient(160deg, var(--primary-dark) 0%, var(--primary) 70%);
  color:#fff; padding:40px; display:flex; flex-direction:column; justify-content:center;
}
.left-panel h1{font-size:2.5rem;margin-bottom:20px;}
.left-panel p{line-height:1.6;}
.left-panel ul{list-style:none;margin-top:20px;padding:0;}
.left-panel ul li{margin-bottom:12px; display:flex; align-items:center; gap:10px; font-size:0.95rem;}
.left-panel ul li i{color:#fff;}

.right-panel{
  flex:1; padding:40px; display:flex; flex-direction:column; justify-content:center;
}
.right-panel h2{margin-bottom:20px; color:var(--text);}
.role-tabs{display:flex; gap:10px; margin-bottom:25px;}
.role-tab{
  flex:1; padding:10px; border:1px solid #ccc; border-radius:8px;
  text-align:center; cursor:pointer; transition:0.2s; display:flex; align-items:center; justify-content:center; gap:6px;
  background:#f5f5f5;
}
.role-tab.active{background:var(--primary); color:#fff; border-color:var(--primary);}
.form-group{margin-bottom:18px; position:relative;}
.form-group label{display:block;margin-bottom:6px;font-weight:500;}
.form-group input{
  width:100%; padding:12px 14px 12px 40px; border-radius:8px; border:1px solid #ccc; font-size:0.95rem;
}
.form-group input:focus{border-color:var(--primary);}
.form-group .eye-icon{
  position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#888;
}
button.submit-btn{
  width:100%; padding:14px; border:none; border-radius:8px; background:var(--primary);
  color:#fff; font-weight:500; font-size:1rem; cursor:pointer; transition:0.2s;
}
button.submit-btn:hover{background:var(--primary-dark);}
.forgot-row{text-align:right; margin-bottom:15px;}
.toast{
  display:none; padding:12px 15px; border-radius:8px; font-size:0.88rem; margin-bottom:15px;
}
.toast.error{background:#FFF0F2; color:#8B0000; border:1px solid #FFB3BF;}
.toast.success{background:#F0FFF4; color:#006620; border:1px solid #B3FFCC;}
.spinner{
  width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff;
  border-radius:50%; display:none; animation:spin 0.7s linear infinite; margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:800px){.card{flex-direction:column;}.left-panel{display:none;}}
</style>
</head>
<body>

<div class="card">
  <div class="left-panel">
    <h1>Welcome Back</h1>
    <p>Login to manage blood requests, donations, and receive emergency alerts. Every login helps save lives.</p>
    <ul>
      <li><i class="fa-solid fa-bolt"></i> Real-time emergency alerts</li>
      <li><i class="fa-solid fa-map-location-dot"></i> Location-based donor matching</li>
      <li><i class="fa-solid fa-shield-heart"></i> Secure data management</li>
    </ul>
  </div>

  <div class="right-panel">
    <h2>Sign In</h2>

    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('donor',this)"><i class="fa-solid fa-hand-holding-droplet"></i> Donor</div>
      <div class="role-tab" onclick="setRole('receiver',this)"><i class="fa-solid fa-user-injured"></i> Receiver</div>
      <div class="role-tab" onclick="setRole('hospital',this)"><i class="fa-solid fa-hospital"></i> Hospital</div>
    </div>
    <input type="hidden" id="roleInput" value="donor">

    <div class="toast" id="toast"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
        <i class="fa-solid fa-eye eye-icon" onclick="togglePassword()"></i>
      </div>

      <div class="forgot-row">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Sign In</span>
      </button>
    </form>
  </div>
</div>

<script>
let currentRole='donor';
function setRole(role, el){
  currentRole=role;
  document.getElementById('roleInput').value=role;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}
function togglePassword(){
  const input=document.getElementById('password'); 
  const icon=document.querySelector('.eye-icon');
  if(input.type==='password'){input.type='text'; icon.classList.replace('fa-eye','fa-eye-slash');}
  else{input.type='password'; icon.classList.replace('fa-eye-slash','fa-eye');}
}
function showToast(msg,type='error'){
  const t=document.getElementById('toast');
  t.className=`toast ${type}`;
  t.textContent=msg;
  t.style.display='block';
  setTimeout(()=>{t.style.display='none';},3000);
}
document.getElementById('loginForm').addEventListener('submit', e=>{
  e.preventDefault();
  const email=document.getElementById('email').value;
  const pwd=document.getElementById('password').value;
  if(!email || !pwd){showToast('Enter email & password'); return;}
  document.getElementById('spinner').style.display='inline-block';
  document.getElementById('btnText').style.display='none';

  // Demo / replace with your API call
  fetch('/api/login', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    email: email,
    password: pwd,
    role: currentRole
  })
})
.then(r => r.json())
.then(data => {
  document.getElementById('spinner').style.display='none';
  document.getElementById('btnText').style.display='inline';
  if (data.token) {
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);
    localStorage.setItem('user', JSON.stringify(data.user));
    showToast('Login successful!', 'success');
    setTimeout(() => {
      if (data.role === 'donor')
        window.location.href = 'donor-dashboard.html';
      else if (data.role === 'receiver')
        window.location.href = 'receiver-dashboard.html';
      else if (data.role === 'hospital')
        window.location.href = 'hospital-dashboard.html';
    }, 800);
  } else {
    showToast(data.message || 'Login failed!');
  }
})
.catch(() => {
  document.getElementById('spinner').style.display='none';
  document.getElementById('btnText').style.display='inline';
  showToast('Server error. Make sure server is running!');
});
});
</script>

</body>
</html>
